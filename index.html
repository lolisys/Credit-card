<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Dialer</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; padding-top: 50px; }
        .dialer-screen { width: 280px; height: 60px; background: white; border: 1px solid #ccc; margin-bottom: 20px; font-size: 24px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 280px; }
        .key { background: white; border: 1px solid #ddd; padding: 20px; font-size: 20px; text-align: center; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .key:active { background: #eee; }
        .call-buttons { display: flex; gap: 20px; margin-top: 30px; }
        .call-btn { width: 60px; height: 60px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .sim1 { background-color: #27ae60; } /* Green like your screenshot */
        .sim2 { background-color: #16a085; }
    </style>
</head>
<body>

    <!-- This shows what the user is typing -->
    <div class="dialer-screen" id="display">*165#</div>

    <div class="numpad">
        <div class="key" onclick="press('1')">1</div>
        <div class="key" onclick="press('2')">2</div>
        <div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('4')">4</div>
        <div class="key" onclick="press('5')">5</div>
        <div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('7')">7</div>
        <div class="key" onclick="press('8')">8</div>
        <div class="key" onclick="press('9')">9</div>
        <div class="key" onclick="press('*')">*</div>
        <div class="key" onclick="press('0')">0</div>
        <div class="key" onclick="press('#')">#</div>
    </div>

    <div class="call-buttons">
        <!-- The href is dynamically changed by the script below -->
        <a id="callLink" href="tel:*165%23" class="call-btn sim1">📞</a>
        <button class="call-btn sim2" onclick="clearDisplay()">C</button>
    </div>

    <script>
        let currentCode = "*165#";
        const display = document.getElementById('display');
        const callLink = document.getElementById('callLink');

        function press(num) {
            currentCode += num;
            updateUI();
        }

        function clearDisplay() {
            currentCode = "";
            updateUI();
        }

        function updateUI() {
            display.innerText = currentCode;
            // Replace # with %23 for the tel link to work
            let formattedCode = currentCode.replace(/#/g, '%23');
            callLink.href = "tel:" + formattedCode;
        }
    </script>
</body>
</html>
