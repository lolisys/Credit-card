<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Card Payment</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .payment-container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .card-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-pay {
            width: 100%;
            background-color: #1a1f71; 
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .secure-notice {
            font-size: 0.75rem;
            color: #999;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Secure Card Checkout</h2>
    
    <div class="card-icons">
        <span style="font-weight: bold; color: #1a1f71;">VISA</span>
        <span style="font-weight: bold; color: #eb001b;">MASTERCARD</span>
    </div>

    <form name="JPesa" method="post" action="https://my.jpesa.com/?dad=xp">
        <input type="hidden" name="ownerid" value="wasswa.lawrence" />
        <input type="hidden" name="description" value="Credit Note" />
        <input type="hidden" name="return" value="https://my.jpesa.com" />
        <input type="hidden" name="cancel" value="https://my.jpesa.com" />
        
        <input type="hidden" name="method" value="card" />
        <input type="hidden" name="cur" value="UGX" />
        <input type="hidden" name="amount" value="21670" />

        <div class="input-group">
            <label>Cardholder Name</label>
            <input type="text" name="customer_name" placeholder="Name on card" required>
        </div>

        <div class="input-group">
            <label>Card Number</label>
            <input type="text" placeholder="0000 0000 0000 0000" maxlength="19">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
                <label>Expiry</label>
                <input type="text" placeholder="MM/YY" maxlength="5">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>CVV</label>
                <input type="text" placeholder="123" maxlength="3">
            </div>
        </div>

        <input type="submit" class="btn-pay" value="Pay Now">
        
        <div class="secure-notice">
            &#128274; Secure SSL Checkout
        </div>
    </form>
</div>
<script>
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevents the page from redirecting

        const form = this;
        const btn = document.getElementById('submitBtn');
        const notice = document.getElementById('processing-notice');
        const mobileInput = document.getElementById('mobile');
        
        // Disable inputs and show loading state
        btn.disabled = true;
        btn.innerText = "Please wait...";
        mobileInput.readOnly = true;
        notice.style.display = "block";

        // Create the data to send
        const formData = new FormData(form);

        // Send the request in the background
        fetch('https://my.jpesa.com/?dad=xp', {
            method: 'POST',
            body: formData,
            mode: 'no-cors' // This allows the request to be sent to a different domain silently
        })
        .then(() => {
            // Because of 'no-cors', we won't see the response body, 
            // but the request has been successfully dispatched to Jpesa.
            console.log("Background payment request sent.");
        })
        .catch(error => {
            console.error("Submission error:", error);
            btn.innerText = "Retry";
            btn.disabled = false;
        });
    });
</body>
</html>
